<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ANNIXSH</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial, sans-serif;
}

/* Заголовок */
header {
    padding: 40px;
    border-bottom: 1px solid #222;
}

h1 {
    font-size: 32px;
    letter-spacing: 2px;
}

p {
    color: #aaa;
}

/* Галерея */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 2px;
}

/* Карточки */
.card {
    position: relative;
    overflow: hidden;
}

.card img {
    width: 100%;
    display: block;
    filter: grayscale(100%);
    transition: 0.3s;
}

/* Hover эффект */
.card:hover img {
    filter: grayscale(0%) contrast(120%);
}

/* Неоновая линия */
.card::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: #00f0ff;
    transition: 0.3s;
}

.card:hover::after {
    width: 100%;
}

/* Футер */
footer {
    padding: 30px;
    border-top: 1px solid #222;
    text-align: center;
    color: #666;
}
</style>

</head>

<body>

<header>
    <h1>ANNIXSH</h1>
    <p>Digital artist / visual experiments</p>
</header>

<section class="gallery">

<div class="card">
    <img src="https://via.placeholder.com/500">
</div>

<div class="card">
    <img src="https://via.placeholder.com/500">
</div>

<div class="card">
    <img src="https://via.placeholder.com/500">
</div>

<div class="card">
    <img src="https://via.placeholder.com/500">
</div>

</section>

<footer>
    © 2026 ANNIXSH
</footer>

</body>
</html>
